<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaGeo Security - Mapa y Alertas</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
    <link rel="stylesheet" href="../header/styles.css">
    <link rel="stylesheet" href="../footer/styles.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <script>
        fetch('../header/index.html')
            .then(response => response.text())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                const header = doc.querySelector('header');
                if(header) {
                    const links = header.querySelectorAll('.main-nav a');
                    links.forEach(link => link.classList.remove('active'));
                    const mapLink = Array.from(links).find(l => l.textContent.includes('Mapa'));
                    if(mapLink) mapLink.classList.add('active');
                    
                    document.getElementById('header-placeholder').replaceWith(header);
                    document.dispatchEvent(new Event('headerLoaded'));
                }
            });
    </script>
    <div class="dashboard-container">
        <!-- Sidebar (Filtros) -->
        <aside class="sidebar">
            <div class="filter-section">
                <h2><i class="icon-filter"></i> FILTROS</h2>
                
                <div class="filter-group">
                    <label>Género de la Víctima</label>
                    <select id="filterGender">
                        <option value="Todos">Todos</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Fecha (Rango)</label>
                    <div class="slider-wrapper">
                        <div id="slider-date"></div>
                    </div>
                    <div class="range-labels">
                        <span id="date-min"></span> / <span id="date-max"></span>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Hora (Rango)</label>
                    <div class="slider-wrapper">
                        <div id="slider-time"></div>
                    </div>
                    <div class="range-labels">
                        <span id="time-min"></span> / <span id="time-max"></span>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Edad (Rango)</label>
                    <div class="slider-wrapper">
                        <div id="slider-age"></div>
                    </div>
                    <div class="range-labels">
                        <span id="age-min"></span> años / <span id="age-max"></span> años
                    </div>
                </div>

                <button class="btn-secondary" id="btnClearFilters">Limpiar Todo</button>
            </div>

            <div class="events-counter">
                <h3>ESTADO DEL SISTEMA</h3>
                <div class="connection-status offline" id="connectionBadge" style="margin-bottom: 15px; display: inline-block;">
                    Sin conexión
                </div>
                <h3>EVENTOS ACTIVOS</h3>
                <div class="counter-number" id="activeEvents">0</div>
            </div>
        </aside>

        <!-- Mapa -->
        <main class="map-container">
            <div id="map"></div>
        </main>

        <!-- Tabla de Logs -->
        <footer class="log-panel">
            <div class="log-header">
                <h2><i class="icon-list"></i> LOG DE EMERGENCIAS EN VIVO</h2>
            </div>
            <div class="table-container">
                <table id="logTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>FECHA Y HORA</th>
                            <th>CIUDADANO (NOMBRES)</th>
                            <th>GÉNERO / EDAD</th>
                            <th>TIPO</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <!-- Las filas se insertarán dinámicamente -->
                    </tbody>
                </table>
            </div>
        </footer>
    </div>

    <div id="footer-placeholder"></div>
    <script>
        fetch('../footer/index.html')
            .then(response => response.text())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                const footer = doc.querySelector('footer');
                if(footer) {
                    document.getElementById('footer-placeholder').replaceWith(footer);
                    document.dispatchEvent(new Event('footerLoaded'));
                }
            });
    </script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
    <script src="../config.js"></script>
    <script src="script.js"></script>
    <script src="../header/script.js"></script>
    <script src="../footer/script.js"></script>
</body>
</html>
